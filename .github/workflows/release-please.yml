name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_TOKEN }}

      - uses: googleapis/release-please-action@v5
        id: release-please
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json

      - uses: actions/checkout@v6
        if: steps.release-please.outputs.prs_created == 'true'
        with:
          ref: ${{ fromJson(steps.release-please.outputs.prs)[0].headBranchName }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Patch seal_ui version in example/pubspec.lock
        if: steps.release-please.outputs.prs_created == 'true'
        run: |
          NEW_VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          python3 - <<PYEOF
          import re

          new_version = '${NEW_VERSION}'

          with open('example/pubspec.lock', 'r') as f:
              content = f.read()

          updated = re.sub(
              r'(?m)(^  seal_ui:\n(?:^    [^\n]+\n)*?^    version: ")[^"]+(")',
              lambda m: m.group(1) + new_version + m.group(2),
              content,
          )

          with open('example/pubspec.lock', 'w') as f:
              f.write(updated)
          PYEOF

      - name: Commit if changed
        if: steps.release-please.outputs.prs_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add example/pubspec.lock
          git diff --staged --quiet || git commit -m "chore: sync example/pubspec.lock seal_ui version"
          git push