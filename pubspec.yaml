name: nebula_ui
description: "Nebula UI — A token-driven Flutter Design System with space-inspired aesthetics, layered architecture, and responsive scaling."
version: 0.1.0
homepage: https://github.com/nayadev/nebula_ui
publish_to: 'none'

environment:
  sdk: ^3.11.1
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  widgetbook: ^3.10.0
  widgetbook_annotation: ^3.2.0

flutter:
  uses-material-design: true
