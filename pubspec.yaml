name: seal_ui
description: "Seal UI — A token-driven Flutter Design System with bold, curated themes, layered architecture, and responsive scaling."
version: 0.2.0
repository: https://github.com/nayadev/seal_ui_flutter
issue_tracker: https://github.com/nayadev/seal_ui_flutter/issues


topics:
  - design-system
  - ui
  - tokens
  - theme

environment:
  sdk: ^3.11.1
  flutter: ">=3.29.0"

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  shadcn_ui: ^0.52.1
  lucide_icons_flutter: ^3.1.10
  seal_ui_tokens:
    git:
      url: https://github.com/nayadev/seal_ui_tokens.git
      path: build/flutter
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


